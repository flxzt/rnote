---

name: Nightly

"on":
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
  workflow_call:

jobs:
  flatpak:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build nightly flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb
        with:
          manifest-path: build-aux/com.github.flxzt.rnote.Devel.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: x86_64
          build-bundle: true
          bundle: com.github.flxzt.rnote.Devel.flatpak
