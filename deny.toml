    "GPL-3.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-or-later",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "ISC",
    "CC0-1.0",
]
[advisories]
